url: https://traitecoevo.github.io/ecoacoustic_utilities/

template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, reference, articles]
    right: [search, github]
  components:
    github:
      icon: fa-github
      aria-label: "GitHub repository"
      href: https://github.com/traitecoevo/ecoacoustic_utilities/

# Sections are driven by roxygen @family tags (concepts), so newly added
# functions appear automatically as long as they carry the right @family tag.
reference:
  - title: "iNaturalist"
    desc: "Download sounds and images from iNaturalist"
    contents:
      - has_concept("inaturalist")

  - title: "Atlas of Living Australia"
    desc: "Download data from ALA"
    contents:
      - has_concept("ala")

  - title: "Xeno-Canto"
    desc: "Download sounds from Xeno-Canto"
    contents:
      - has_concept("xenocanto")

  - title: "Audio Utilities"
    desc: "Tools for managing and analyzing audio files"
    contents:
      - has_concept("audio")

  - title: "Other"
    desc: "Anything not yet assigned to a section above"
    contents:
      - lacks_concepts(c("inaturalist", "ala", "xenocanto", "audio"))
