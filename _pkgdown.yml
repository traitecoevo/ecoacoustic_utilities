      - get_inat_species_summary
      - plot_inat_species_summary

  - title: "Atlas of Living Australia"
    desc: "Download data from ALA"
    contents:
      - get_ala_sounds
      - get_ala_circle_occurrences

  - title: "Audio Utilities"
    desc: "Tools for managing and analyzing audio files"
    contents:
      - analyze_call_properties
      - convert_to_wav
      - biggest_files
      - find_duplicate_wavs
      - training_dataset_summary
      - print.training_dataset_summary
