url: https://traitecoevo.github.io/ecoacoustic_utilities/

template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, reference, articles]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/wcornwell/ecoacoustic_utilities/

reference:
  - title: "iNaturalist"
    desc: "Download sounds and images from iNaturalist"
    contents:
      - get_inat_sounds
